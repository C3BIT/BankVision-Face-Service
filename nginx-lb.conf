events {
    worker_connections 1024;
}

http {
    upstream opencv_face_cluster {
        least_conn;  # Load balance to least connected server
        server opencv-face-1:5097;
        server opencv-face-2:5097;
        server opencv-face-3:5097;
        server opencv-face-4:5097;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://opencv_face_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://opencv_face_cluster/health;
        }
    }
}
